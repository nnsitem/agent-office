<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Agent Office</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body {
    background:#111119; color:#d8d8e8; margin:0; height:100vh;
    display:flex; flex-direction:column; overflow:hidden;
    font:14px/1.5 system-ui, -apple-system, sans-serif;
  }
  header {
    display:flex; align-items:baseline; gap:1.2rem;
    padding:.6rem 1.2rem; border-bottom:1px solid #23232f; flex:none;
  }
  h1 { font-size:.9rem; letter-spacing:.18em; text-transform:uppercase; color:#8f8fb0; margin:0;
       font-family: ui-monospace, Menlo, monospace; }
  #counts { font-size:.8rem; color:#6a6a88; }
  #counts b { color:#d8d8e8; }
  header a { color:#5aa9ff; font-size:.8rem; margin-left:auto; text-decoration:none; }

  #app { flex:1; display:flex; min-height:0; }

  /* ---- Gather-style participants panel ---- */
  aside {
    width:260px; flex:none; background:#16161f; border-right:1px solid #23232f;
    overflow-y:auto; padding:.6rem 0;
  }
  aside h3 {
    margin:.2rem 1rem .5rem; font-size:.72rem; letter-spacing:.12em;
    text-transform:uppercase; color:#6a6a88; font-weight:600;
  }
  .room-group { margin-bottom:.7rem; }
  .room-name {
    padding:.15rem 1rem; font-size:.7rem; letter-spacing:.1em; color:#8f8fb0;
    text-transform:uppercase; font-family: ui-monospace, Menlo, monospace;
  }
  .agent-row {
    display:flex; align-items:center; gap:.6rem; padding:.4rem 1rem;
    cursor:pointer; border-left:3px solid transparent;
  }
  .agent-row:hover { background:#1d1d2a; }
  .agent-row.selected { background:#222232; border-left-color:#ffd64a; }
  .avatar {
    width:26px; height:26px; border-radius:50%; flex:none;
    display:flex; align-items:center; justify-content:center;
    font-size:.7rem; font-weight:700; color:#14141c;
  }
  .agent-row .info { min-width:0; flex:1; overflow:hidden; }
  .agent-row .name {
    display:block; font-size:.8rem; color:#e8e8f4; white-space:nowrap;
    overflow:hidden; text-overflow:ellipsis; font-weight:500;
  }
  .agent-row .sub {
    display:block; font-size:.7rem; color:#6a6a88; white-space:nowrap;
    overflow:hidden; text-overflow:ellipsis;
    font-family: ui-monospace, Menlo, monospace;
  }
  .status-dot { width:9px; height:9px; border-radius:50%; flex:none; }
  #none { padding:.4rem 1rem; color:#55556e; font-size:.78rem; }

  main {
    flex:1; display:flex; flex-direction:column; align-items:center;
    justify-content:center; min-width:0; padding:.8rem;
  }
  canvas {
    max-width:100%; max-height:calc(100% - 30px);
    aspect-ratio:3/2; width:auto; height:auto;
    border:3px solid #23232f; border-radius:6px; background:#111119;
    flex:none;
  }
  .legend { font-size:.72rem; color:#55556e; padding-top:.5rem; font-family:ui-monospace,monospace; }
  .legend span { margin:0 .5rem; }
  .lg-claude{color:#ff9d5c}.lg-kiro{color:#c792ea}.lg-gemini{color:#6cb2ff}.lg-codex{color:#7ee08a}

  #card {
    position:fixed; z-index:10; min-width:240px; max-width:340px;
    background:#191926; border:1px solid #33334d; border-radius:8px;
    padding:.7rem .9rem; font-size:.78rem; line-height:1.6;
    box-shadow:0 8px 30px rgba(0,0,0,.5);
  }
  #card[hidden] { display:none; }
  #card h2 { margin:0 0 .3rem; font-size:.85rem; color:#fff; }
  #card dl { margin:0; display:grid; grid-template-columns:auto 1fr; gap:0 .8rem; }
  #card dt { color:#6a6a88; }
  #card dd { margin:0; word-break:break-all; }
</style>
</head>
<body>
<header>
  <h1>Agent Office</h1>
  <span id="counts">connecting…</span>
  <a href="/debug.html">debug view →</a>
</header>
<div id="app">
  <aside>
    <h3 id="panel-title">Agents</h3>
    <div id="panel"></div>
    <p id="none">No live agents.</p>
  </aside>
  <main>
    <canvas id="office"></canvas>
    <div class="legend">
      <span class="lg-claude">■ claude</span><span class="lg-kiro">■ kiro</span>
      <span class="lg-gemini">■ gemini</span><span class="lg-codex">■ codex</span>
      <span>💬 working · … thinking · ! needs permission · Zz idle</span>
    </div>
  </main>
</div>
<div id="card" hidden></div>
<script src="/sprites.js"></script>
<script src="/sim.js"></script>
<script src="/office.js"></script>
<script>
const sim = new window.Sim.Sim();
const canvas = document.getElementById('office');
const office = new window.Office.Office(canvas, sim);
const ST_COLORS = window.Office.STATUS_COLORS;
const SRC_COLORS = window.Sprites.SOURCE_COLORS;

const agents = new Map();
const card = document.getElementById('card');

function esc(s) {
  return String(s ?? '—').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
}

// Compact display name: strip command XML, keep the first few words.
// The full title lives in the detail card.
function shortTitle(a) {
  const t = (a.title || a.source).replace(/<[^>]*>/g, ' ').replace(/\s+/g, ' ').trim();
  const words = t.split(' ').slice(0, 3).join(' ');
  return words.length > 22 ? words.slice(0, 21) + '…' : (words || a.source);
}

function counts() {
  const by = {};
  for (const a of agents.values()) {
    if (a.status === 'gone') continue;
    by[a.status] = (by[a.status] || 0) + 1;
  }
  const total = Object.values(by).reduce((s, n) => s + n, 0);
  document.getElementById('counts').innerHTML =
    `<b>${total}</b> agents — ` +
    ['working', 'thinking', 'waiting', 'idle'].map(s => `${s}: <b>${by[s] || 0}</b>`).join(' · ');
  document.getElementById('panel-title').textContent = `Agents (${total})`;
}

// ---- participants panel, grouped by workspace ----
function renderPanel() {
  const groups = new Map();
  for (const a of agents.values()) {
    if (a.status === 'gone') continue;
    const key = a.project ? a.project.split('/').filter(Boolean).pop() : '?';
    if (!groups.has(key)) groups.set(key, []);
    groups.get(key).push(a);
  }
  const panel = document.getElementById('panel');
  document.getElementById('none').hidden = groups.size > 0;
  panel.innerHTML = [...groups.entries()].map(([room, list]) => `
    <div class="room-group">
      <div class="room-name">${esc(room)}</div>
      ${list.sort((a, b) => (a.title || '').localeCompare(b.title || '')).map(a => `
        <div class="agent-row ${a.id === office.selectedId ? 'selected' : ''}" data-id="${esc(a.id)}">
          <span class="avatar" style="background:${SRC_COLORS[a.source]?.B || '#999'}">
            ${esc({claude:'C',kiro:'K',gemini:'G',codex:'X'}[a.source] || '?')}${a.isSubagent ? '⑂' : ''}
          </span>
          <span class="info">
            <span class="name">${esc(shortTitle(a))}</span>
            <span class="sub">${esc(a.activity || a.status)}</span>
          </span>
          <span class="status-dot" style="background:${ST_COLORS[a.status] || '#666'}"></span>
        </div>`).join('')}
    </div>`).join('');
}

document.getElementById('panel').addEventListener('click', (e) => {
  const row = e.target.closest('.agent-row');
  if (!row) return;
  const a = agents.get(row.dataset.id);
  if (!a) return;
  office.selectedId = a.id;
  renderPanel();
  const r = row.getBoundingClientRect();
  showCard(a, r.right + 10, r.top);
});

function showCard(a, px, py) {
  const up = Math.round((Date.now() - a.firstSeenAt) / 60000);
  const tok = a.tokens ? `${a.tokens.in.toLocaleString()} in / ${a.tokens.out.toLocaleString()} out` : '—';
  card.innerHTML = `
    <h2>${esc(a.title)}</h2>
    <dl>
      <dt>agent</dt><dd class="lg-${esc(a.source)}">${esc(a.source)}${a.isSubagent ? ' (subagent)' : ''}</dd>
      <dt>status</dt><dd>${esc(a.status)}</dd>
      <dt>activity</dt><dd>${esc(a.activity)}</dd>
      <dt>project</dt><dd>${esc(a.project)}</dd>
      <dt>uptime</dt><dd>${up < 1 ? '<1' : up} min</dd>
      <dt>tokens</dt><dd>${esc(tok)}</dd>
      <dt>session</dt><dd>${esc(a.id)}</dd>
    </dl>`;
  card.hidden = false;
  card.style.left = Math.min(window.innerWidth - card.offsetWidth - 12, px) + 'px';
  card.style.top = Math.min(window.innerHeight - card.offsetHeight - 12, py) + 'px';
}

canvas.addEventListener('click', (e) => {
  const r = canvas.getBoundingClientRect();
  const c = office.hitTest((e.clientX - r.left) * (canvas.width / r.width),
                           (e.clientY - r.top) * (canvas.height / r.height));
  if (!c) { card.hidden = true; office.selectedId = null; renderPanel(); return; }
  office.selectedId = c.id;
  renderPanel();
  showCard(c.agent, e.clientX + 14, e.clientY + 8);
  e.stopPropagation();
});
document.addEventListener('click', (e) => {
  if (e.target !== canvas && !card.contains(e.target) && !e.target.closest('.agent-row')) {
    card.hidden = true;
  }
});

const es = new EventSource('/events');
es.onmessage = (e) => {
  const msg = JSON.parse(e.data);
  if (msg.type === 'snapshot') {
    agents.clear();
    for (const a of msg.agents) { agents.set(a.id, a); sim.upsert(a); }
    // ?ff=20 fast-forwards the sim (characters skip the walk-in) — used by
    // screenshot tooling and handy after a reload
    const ff = Number(new URLSearchParams(location.search).get('ff'));
    if (ff > 0) for (let i = 0; i < ff * 60; i++) sim.update(1 / 60);
  } else if (msg.type === 'agent') {
    agents.set(msg.agent.id, msg.agent);
    sim.upsert(msg.agent);
  } else if (msg.type === 'remove') {
    agents.delete(msg.id);
    sim.remove(msg.id);
  }
  counts();
  renderPanel();
};
es.onerror = () => { document.getElementById('counts').textContent = 'reconnecting…'; };
</script>
</body>
</html>
